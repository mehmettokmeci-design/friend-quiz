<!DOCTYPE html>
<html>
<head>
    <title>Friend Quiz 😎</title>
    <style>
        body { background:#121212; color:#eee; font-family:Arial,sans-serif; margin:0; padding:0; }
        .container { max-width:700px; margin:auto; padding:20px; }
        h1 { text-align:center; color:#ffdd57; }
        input[type=text] { width:100%; padding:10px; font-size:16px; margin:10px 0; border-radius:5px; border:none; }
        button { padding:10px 20px; margin:10px 5px 10px 0; font-size:16px; border:none; border-radius:5px; cursor:pointer; background:#ffdd57; color:#121212; transition:0.3s; }
        button:hover { background:#ffc107; }
        .card { background:#1f1f1f; padding:20px; margin:15px 0; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.5); position:relative; }
        .options label { display:block; background:#2c2c2c; padding:10px; margin:5px 0; border-radius:5px; cursor:pointer; transition:0.3s; }
        .options input { margin-right:10px; }
        .options label.correct { background:#4caf50 !important; color:white; }
        .options label.wrong { background:#f44336 !important; color:white; }
        .score { font-size:20px; color:#ffdd57; text-align:center; }
        .delete-btn { position:absolute; top:10px; right:10px; background:#f44336; color:white; padding:5px 10px; font-size:12px; border-radius:5px; }
        .delete-btn:hover { background:#d32f2f; }
        .results { background:#2c2c2c; padding:10px; border-radius:5px; margin:10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Friend Quiz 😎</h1>

    <div id="start">
        <input type="text" id="nameInput" placeholder="Your name...">
        <button onclick="chooseRole()">Start</button>
    </div>

    <div id="roleSelection" style="display:none;">
        <button onclick="setupQuiz()">Role A - Create Quiz</button>
        <button onclick="solveQuiz()">Role B - Solve Quiz</button>
    </div>

    <div id="quizSetup" style="display:none;">
        <div id="questionsContainer"></div>
        <button onclick="addQuestion()">Add Question</button>
        <button onclick="generateLink()">Save & Generate Link</button>
        <button onclick="showResults()">Show Results</button>
        <button onclick="backToQuiz()">Back to Quiz</button>
        <div id="resultsContainer"></div>
    </div>

    <div id="quizPlay" style="display:none;">
        <div id="questionCard" class="card"></div>
        <button onclick="nextQuestion()">Next</button>
    </div>

    <div id="result" style="display:none;">
        <h2>Quiz Completed 😎</h2>
        <div class="score" id="scoreText"></div>
        <button onclick="restart()">Main Menu</button>
    </div>
</div>

<script>
let userName = "", role = "";
let quizQuestions = [], currentQuestion = 0, userAnswers = [];
let results = JSON.parse(localStorage.getItem("friendQuizResults")||"[]");

// On page load - check if quiz in URL
window.onload = function(){
    loadQuizFromURL();
};

// Start
function chooseRole(){
    userName = document.getElementById('nameInput').value.trim();
    if(!userName){ alert("Please enter your name 😎"); return; }
    document.getElementById('start').style.display="none";
    document.getElementById('roleSelection').style.display="block";
}

// Role A
function setupQuiz(){
    role = "A";
    document.getElementById('roleSelection').style.display="none";
    document.getElementById('quizSetup').style.display="block";
    if(document.querySelectorAll('.questionCard').length===0) addQuestion();
}

function addQuestion(){
    let qIndex = document.querySelectorAll('.questionCard').length + 1;
    let container = document.getElementById('questionsContainer');
    let div = document.createElement('div');
    div.classList.add('card','questionCard');
    div.innerHTML = `
        <button class="delete-btn" onclick="deleteQuestion(this)">Delete</button>
        <p><b>${qIndex}. Question:</b></p>
        <input type="text" placeholder="Question text" class="questionText"><br>
        <p>Options:</p>
        <input type="text" placeholder="Option 1" class="optionInput"><br>
        <input type="text" placeholder="Option 2" class="optionInput"><br>
        <input type="text" placeholder="Option 3" class="optionInput"><br>
        <input type="text" placeholder="Correct option number (1-3)" class="correctInput"><br>
    `;
    container.appendChild(div);
}

// Delete question
function deleteQuestion(btn){
    btn.parentElement.remove();
    let cards = document.querySelectorAll('.questionCard');
    cards.forEach((c,i)=>{
        c.querySelector('p b').innerText = `${i+1}. Question:`;
    });
}

// Generate link
function generateLink(){
    quizQuestions = [];
    let questionDivs = document.querySelectorAll('.questionCard');
    if(questionDivs.length === 0){ alert("Add at least one question 😎"); return; }
    for(let q of questionDivs){
        let text = q.querySelector('.questionText').value.trim();
        let opts = Array.from(q.querySelectorAll('.optionInput')).map(i=>i.value.trim());
        let correct = parseInt(q.querySelector('.correctInput').value.trim());
        if(!text || opts.some(o=>o==="") || ![1,2,3].includes(correct)){
            alert("Please fill all fields correctly 😎"); return;
        }
        quizQuestions.push({text:text, options:opts, correct:correct});
    }
    let encoded = btoa(JSON.stringify(quizQuestions));
    let link = window.location.href.split('?')[0] + "?quiz=" + encoded;
    prompt("Send this link to Role B:", link);
}

// Show results for Role A
function showResults(){
    let container = document.getElementById('resultsContainer');
    container.innerHTML = "<h3>Results:</h3>";
    if(results.length===0){ container.innerHTML += "<p>No one has solved the quiz yet 😎</p>"; return; }
    results.forEach(r=>{
        container.innerHTML += `<div class="results"><b>${r.name}</b>: ${r.score} / ${r.total}</div>`;
    });
}

// Back to quiz (Role A)
function backToQuiz(){
    document.getElementById('resultsContainer').innerHTML = "";
    document.getElementById('quizSetup').style.display="block";
}

// Role B
function solveQuiz(){
    role = "B";
    document.getElementById('roleSelection').style.display="none";
    if(quizQuestions.length === 0){ alert("No quiz found 😎"); return; }
    currentQuestion = 0;
    userAnswers = [];
    document.getElementById('quizPlay').style.display="block";
    showQuestion();
}

function showQuestion(){
    let q = quizQuestions[currentQuestion];
    let html = `<p><b>${currentQuestion+1}. ${q.text}</b></p><div class="options">`;
    q.options.forEach((opt,i)=>{
        html += `<label><input type="radio" name="opt" value="${i+1}"> ${opt}</label>`;
    });
    html += "</div>";
    document.getElementById('questionCard').innerHTML = html;
    document.addEventListener('keydown', handleEnter);
}

function handleEnter(e){ if(e.key==="Enter"){ nextQuestion(); } }

function nextQuestion(){
    let selected = document.querySelector('input[name="opt"]:checked');
    if(!selected){ alert("Please select an option 😎"); return; }
    let answer = parseInt(selected.value);
    userAnswers.push(answer);

    let labels = document.querySelectorAll('label');
    labels.forEach((lbl,i)=>{
        if(i+1 === quizQuestions[currentQuestion].correct) lbl.classList.add('correct');
        if(i+1 === answer && answer !== quizQuestions[currentQuestion].correct) lbl.classList.add('wrong');
    });

    document.removeEventListener('keydown', handleEnter);
    currentQuestion++;
    if(currentQuestion < quizQuestions.length){ setTimeout(showQuestion,1000); }
    else { setTimeout(finishQuiz,1000); }
}

function finishQuiz(){
    document.getElementById('quizPlay').style.display="none";
    document.getElementById('result').style.display="block";
    let score = 0;
    for(let i=0;i<quizQuestions.length;i++){
        if(userAnswers[i] === quizQuestions[i].correct) score++;
    }
    document.getElementById('scoreText').innerText = "Your Score: "+score+" / "+quizQuestions.length;

    // Save result
    results.push({name:userName, score:score, total:quizQuestions.length});
    localStorage.setItem("friendQuizResults", JSON.stringify(results));
}

function restart(){
    userName = ""; role = ""; quizQuestions = []; currentQuestion = 0; userAnswers = [];
    document.getElementById('start').style.display="block";
    document.getElementById('roleSelection').style.display="none";
    document.getElementById('quizSetup').style.display="none";
    document.getElementById('quizPlay').style.display="none";
    document.getElementById('result').style.display="none";
    document.getElementById('nameInput').value = "";
    document.getElementById('questionsContainer').innerHTML = "";
    document.getElementById('resultsContainer').innerHTML = "";
}

// Load quiz from URL
function loadQuizFromURL(){
    let params = new URLSearchParams(window.location.search);
    if(params.has("quiz")){
        try{
            quizQuestions = JSON.parse(atob(params.get("quiz")));
            solveQuiz();
        } catch(e){ console.error("Failed to load quiz", e); alert("Invalid or corrupted quiz link 😎"); }
    }
}
</script>
</body>
</html>
